<!DOCTYPE html>
<html>
<head>
    <title>Andrew Tate Online Shop</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: black;
            color: gold;
            padding: 20px;
            text-align: center;
        }

        h1 {
            margin: 0;
        }

        .container {
            padding: 40px;
        }

        .products {
            display: flex;
            justify-content: space-around;
            gap: 20px;
            flex-wrap: wrap;
        }

        .product {
            background-color: white;
            padding: 20px;
            width: 250px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        .product img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 10px;
        }

        .price {
            font-weight: bold;
            color: green;
        }

        button {
            background-color: gold;
            border: none;
            padding: 10px;
            width: 100%;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }

        button:hover {
            background-color: black;
            color: white;
        }

        form {
            background-color: white;
            padding: 20px;
            margin-top: 40px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        footer {
            background-color: black;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 40px;
        }

        /* Hide sections initially */
        #checkoutPage {
            display: none;
        }

        .order-summary {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>

            <h2>Customer Information</h2>

            <form id="customerForm">
                <label for="fullname">Full Name</label>
                <input type="text" id="fullname" name="fullname" placeholder="John Doe" required>

    <!-- FAKE CHECKOUT PAGE -->
    <div id="checkoutPage">
        <header>
            <h1>Checkout - Andrew Tate Online Shop</h1>
        </header>
        <div class="container">
            <div class="order-summary">
                <h2>Order Summary</h2>
                <p id="orderProduct"></p>
                <p id="orderPrice"></p>
                <h3>Customer Details</h3>
                <p id="custName"></p>
                <p id="custEmail"></p>
                <p id="custPhone"></p>
                <p id="custAddress"></p>
                <p id="custPayment"></p>
                <button onclick="completeOrder()">Confirm Order</button>
            </div>
        </div>
    </div>

    <footer>
        © 2026 Andrew Tate Online Shop | All Rights Reserved
    </footer>

    <script>
        let selectedProduct = '';
        let selectedPrice = 0;

        function buyNow(product, price) {
            selectedProduct = product;
            selectedPrice = price;
            // Scroll to customer form
            document.getElementById('customerForm').scrollIntoView({ behavior: 'smooth' });
        }

        function proceedToCheckout() {
            // Get customer info
            const name = document.getElementById('fullname').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const address = document.getElementById('address').value;
            const payment = document.getElementById('payment').value;

            if(!name || !email || !phone || !address || !payment) {
                alert('Please fill all customer information.');
                return;
            }

            // Fill checkout summary
            document.getElementById('orderProduct').innerText = `Product: ${selectedProduct}`;
            document.getElementById('orderPrice').innerText = `Price: ₱${selectedPrice}`;
            document.getElementById('custName').innerText = `Name: ${name}`;
            document.getElementById('custEmail').innerText = `Email: ${email}`;
            document.getElementById('custPhone').innerText = `Phone: ${phone}`;
            document.getElementById('custAddress').innerText = `Address: ${address}`;
            document.getElementById('custPayment').innerText = `Payment Method: ${payment}`;

            // Hide shop page, show checkout page
            document.getElementById('shopPage').style.display = 'none';
            document.getElementById('checkoutPage').style.display = 'block';
        }

        function completeOrder() {
            alert('Thank you for your order! Your fake checkout is complete.');
            // Reset the page
            document.getElementById('checkoutPage').style.display = 'none';
            document.getElementById('shopPage').style.display = 'block';
            document.getElementById('customerForm').reset();
        }
    </script>
